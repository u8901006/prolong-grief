<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grief Research Daily · 悲傷研究文獻日報</title>
<style>
  :root { --bg: #f6f1e8; --surface: #fffaf2; --line: #d8c5ab; --text: #2b2118; --muted: #766453; --accent: #8c4f2b; --accent-soft: #ead2bf; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: radial-gradient(circle at top, #fff6ea 0, var(--bg) 55%, #ead8c6 100%); color: var(--text); font-family: "Noto Sans TC", "PingFang TC", "Helvetica Neue", Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { text-align: center; padding: 60px 24px; }
  .logo { font-size: 64px; margin-bottom: 20px; }
  h1 { font-size: 28px; color: var(--text); margin-bottom: 12px; }
  .subtitle { color: var(--accent); font-size: 16px; margin-bottom: 24px; }
  .desc { color: var(--muted); font-size: 14px; line-height: 1.8; max-width: 480px; margin: 0 auto; }
  .status { margin-top: 32px; padding: 12px 24px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; display: inline-block; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">🕊️</div>
  <h1>Grief Research Daily</h1>
  <p class="subtitle">悲傷與喪親研究文獻日報</p>
  <p class="desc">
    涵蓋延長性悲傷疾患（PGD）、複雜性悲傷、喪親、創傷性悲傷、<br/>
    自殺遺族、兒少喪親、周產期喪失、安寧緩和照護悲傷等主題
  </p>
  <div class="status">⏳ 首份報告將在下次排程執行後生成</div>
</div>
</body>
</html>
