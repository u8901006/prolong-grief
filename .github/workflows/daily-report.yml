name: Grief Research Daily Report

on:
  schedule:
    - cron: "40 6 * * *" # UTC 06:40 = 台北時間 14:40
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine date
        id: date
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          if [ -n "$INPUT_DATE" ]; then
            if echo "$INPUT_DATE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "target=$INPUT_DATE" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Invalid date format: must be YYYY-MM-DD"
              exit 1
            fi
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch papers from PubMed
        run: |
          python scripts/fetch_papers.py \
            --days 7 \
            --max-papers 50 \
            --json \
            --output papers.json
        continue-on-error: true

      - name: Check papers data
        id: papers
        env:
          REPORT_DATE: ${{ steps.date.outputs.target }}
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(python -c "import json; print(json.load(open('papers.json')).get('count',0))")
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
            python -c "
          import json, os
          d = os.environ['REPORT_DATE']
          json.dump({'date': d, 'count': 0, 'papers': []}, open('papers.json','w'), ensure_ascii=False)
          "
            echo "No papers found, will generate empty report"
          fi

      - name: Generate report with Zhipu AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          REPORT_DATE: ${{ steps.date.outputs.target }}
        run: |
          python scripts/generate_report.py \
            --input papers.json \
            --output "docs/grief-${REPORT_DATE}.html" \
            --api-key "$ZHIPU_API_KEY"

      - name: Generate index page
        run: python scripts/generate_index.py

      - name: Commit and push
        env:
          REPORT_DATE: ${{ steps.date.outputs.target }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "grief research daily report: ${REPORT_DATE}"
          git pull --rebase origin main
          git push

      - name: Summary
        env:
          REPORT_DATE: ${{ steps.date.outputs.target }}
          PAPER_COUNT: ${{ steps.papers.outputs.count }}
        run: |
          echo "### Grief Research Daily Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** ${REPORT_DATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Papers analyzed:** ${PAPER_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Report:** [grief-${REPORT_DATE}.html](https://u8901006.github.io/prolong-grief/grief-${REPORT_DATE}.html)" >> "$GITHUB_STEP_SUMMARY"
